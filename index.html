<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia Junim - Painel Vertical</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Garante o preenchimento perfeito na tela vertical */
            object-position: center;
        }

        /* Fixado no topo absoluto da tela vertical */
        #top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 5vh 20px 10vh 20px; /* Margem responsiva para TV vertical */
            box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0) 100%);
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Trava no topo */
            transition: opacity 0.5s ease;
        }

        .counter-box {
            background: rgba(20, 20, 20, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 20px 60px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .counter-number {
            font-size: 8rem; /* Tamanho ajustado para leitura à distância na TV */
            font-weight: 800;
            margin: 0;
            line-height: 1;
            color: #ffffff;
            text-shadow: 0 0 30px rgba(255,255,255,0.2);
        }

        .counter-text {
            font-size: 1.5rem;
            margin: 8px 0 0 0;
            color: #8e8e93;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 500;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="main-video" autoplay loop muted playsinline>
            <source src="anuncio.mp4" type="video/mp4">
        </video>
    </div>

    <div id="top-bar">
        <div class="counter-box">
            <p class="counter-number" id="contador-clientes">--</p>
            <p class="counter-text" id="texto-clientes">Aguardando...</p>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "COLOQUE_SUA_URL_AQUI"; 
        
        const videoElement = document.getElementById('main-video');
        const topBar = document.getElementById('top-bar');
        const elContador = document.getElementById('contador-clientes');
        const elTextoClientes = document.getElementById('texto-clientes');

        let currentVideo = "anuncio.mp4"; 

        function switchState(videoSrc, hideTopBar) {
            if (currentVideo !== videoSrc) {
                currentVideo = videoSrc;
                videoElement.src = videoSrc;
                videoElement.play();
            }
            if (hideTopBar) {
                topBar.classList.add('hidden');
            } else {
                topBar.classList.remove('hidden');
            }
        }

        async function updateDashboard() {
            try {
                if (SCRIPT_URL === "COLOQUE_SUA_URL_AQUI") return;

                const response = await fetch(SCRIPT_URL);
                if (!response.ok) throw new Error('Network error');
                
                const dadosNuvem = await response.json();
                
                if (dadosNuvem.qtd === 'lunch' || dadosNuvem.qtd === 'closed' || dadosNuvem.status === 'lunch') {
                    switchState('almoco.mp4', true);
                    return;
                }

                const qtd = Number(dadosNuvem.qtd) || 0;
                elContador.textContent = String(qtd).padStart(2, '0');
                
                if (qtd === 0) elTextoClientes.textContent = "Barbearia Vazia";
                else if (qtd === 1) elTextoClientes.textContent = "Cliente na Fila";
                else elTextoClientes.textContent = "Clientes na Fila";
                
                switchState('anuncio.mp4', false);

            } catch (error) {
                elContador.textContent = "--";
                elTextoClientes.textContent = "Offline";
                switchState('anuncio.mp4', false);
            }
        }

        updateDashboard();
        setInterval(updateDashboard, 5000);
    </script>
</body>
</html>
