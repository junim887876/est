<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anúncio</title>
    <style>
        /* Remove as margens padrão e centraliza o vídeo na tela com fundo preto */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Garante que o vídeo seja responsivo e não ultrapasse o tamanho da tela */
        video {
            max-width: 100%;
            max-height: 100vh;
            outline: none;
        }
    </style>
</head>
<body>

    <video src="anuncio.mp4" autoplay loop muted playsinline controls></video>

</body>
</html>
