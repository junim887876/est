<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anúncio Tela Cheia</title>
    <style>
        /* Zera todas as margens e barras de rolagem da página */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Impede que apareça barra de rolagem */
            background-color: #000;
        }

        /* Configuração minuciosa para o vídeo cobrir 100% da tela */
        video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -100;
            transform: translateX(-50%) translateY(-50%);
            object-fit: cover; /* Garante que o vídeo preencha toda a tela sem distorcer a imagem */
            pointer-events: none; /* Impede que o usuário pause o vídeo clicando nele */
        }
    </style>
</head>
<body>

    <video src="anuncio.mp4" autoplay loop muted playsinline></video>

</body>
</html>
